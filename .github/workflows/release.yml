name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Leave blank for a dry-run build with no release.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-glob: |
              dist/*.dmg
              dist/*.zip
          - os: windows-latest
            artifact-glob: |
              dist/*.exe
              dist/*.msi
          - os: ubuntu-latest
            artifact-glob: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        # node-gyp (used by smart-whisper / keytar) needs distutils, removed in Python 3.12+
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux native build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsecret-1-dev \
            build-essential

      - name: Install dependencies
        run: npm ci

      - name: Package (electron-builder)
        run: npm run package
        env:
          # electron-builder picks this up to publish; leave empty to only build artifacts.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip auto-publish from electron-builder — we publish in the release job below.
          EB_PUBLISH: never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release-assets/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
