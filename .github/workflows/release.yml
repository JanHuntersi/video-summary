name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Leave blank for a dry-run build with no release.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon) — runs on arm64 host so native rebuilds match.
          - id: macos-arm64
            os: macos-latest
            builder-flags: --mac --arm64
            artifact-glob: |
              dist/*.dmg
              dist/*.zip
          # macOS x64 (Intel) — runs on Intel host (macos-13).
          - id: macos-x64
            os: macos-13
            builder-flags: --mac --x64
            artifact-glob: |
              dist/*.dmg
              dist/*.zip
          - id: windows
            os: windows-latest
            builder-flags: --win
            artifact-glob: |
              dist/*.exe
              dist/*.msi
          - id: linux
            os: ubuntu-latest
            builder-flags: --linux
            artifact-glob: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        # node-gyp (used by smart-whisper / keytar) needs distutils, removed in Python 3.12+
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux native build deps
        if: matrix.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsecret-1-dev \
            build-essential

      - name: Install dependencies
        run: npm ci

      - name: Build bundle (electron-vite)
        run: npm run build

      - name: Package (electron-builder, single arch)
        # We invoke electron-builder explicitly with a single arch per job.
        # Running both archs from one host caused @electron/rebuild to leave the
        # last-rebuilt arch's keytar.node in node_modules and ship the wrong
        # binary inside one of the two DMGs (issue seen in v0.1.0 – v0.1.3).
        run: npx electron-builder ${{ matrix.builder-flags }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.id }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release-assets/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
